server:
  port: 8081

spring:
  application:
    name: auth-service
  cloud:
    config:
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/auth_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 1. CHANGE THIS FROM 'update' TO 'create'
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:ShopSphereSuperSecretKeyForJwtGenerationDoNotShare}